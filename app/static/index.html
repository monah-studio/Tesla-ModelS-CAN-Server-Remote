<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Tesla Local Control</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#000;--surface:#0d0d0d;--surface2:#141414;--surface3:#1c1c1e;--card:rgba(255,255,255,.04);--cardBorder:rgba(255,255,255,.06);--onSurface:#fff;--onSurfaceDim:#8e8e93;--onSurfaceMuted:#48484a;--accent:#1678FF;--accentDim:rgba(22,120,255,.12);--green:#30d158;--greenDim:rgba(48,209,88,.12);--red:#ff453a;--redDim:rgba(255,69,58,.12);--amber:#ff9f0a;--radius:16px;--radiusSm:12px;--radiusXs:8px;--radiusPill:100px}
  html,body{height:100%;-webkit-font-smoothing:antialiased}
  body{font-family:-apple-system,'Inter','PingFang HK','Helvetica Neue',sans-serif;background:var(--bg);color:var(--onSurface);overflow-x:hidden}
  ::-webkit-scrollbar{width:0;height:0}
  .app{max-width:480px;margin:0 auto;min-height:100vh;padding:0 20px;padding-top:env(safe-area-inset-top,4px);padding-bottom:calc(env(safe-area-inset-bottom,16px)+90px)}

  /* ── Top Bar ── */
  .top-bar{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
  .top-bar .tb-left{display:flex;align-items:center;gap:6px}
  .top-bar .tb-vehicle{font-size:17px;font-weight:700;letter-spacing:-.3px}
  .top-bar .tb-vehicle .arrow{font-size:9px;color:var(--onSurfaceDim);margin-left:3px}
  .top-bar .tb-conn{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--cardBorder);border-radius:var(--radiusPill);padding:3px 8px 3px 5px;font-size:10px;font-weight:500;color:var(--onSurfaceDim)}
  .top-bar .conn-dot{width:5px;height:5px;border-radius:50%}
  .top-bar .conn-dot.online{background:var(--green)}
  .top-bar .conn-dot.offline{background:var(--onSurfaceMuted)}

  /* ── Car Hero Area ── */
  .car-hero{position:relative;height:230px;display:flex;align-items:center;justify-content:center;margin:0 -20px;overflow:hidden}
  .car-hero .glow{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:280px;height:120px;border-radius:50%;background:radial-gradient(ellipse,rgba(22,120,255,.06) 0%,transparent 70%);transition:all .6s ease}
  .car-hero .glow.unlocked{background:radial-gradient(ellipse,rgba(48,209,88,.1) 0%,transparent 70%)}
  .car-hero .glow.locked{background:radial-gradient(ellipse,rgba(255,69,58,.06) 0%,transparent 70%)}
  .car-svg-wrap{position:relative;width:320px;height:175px}
  .car-svg-wrap.shake{animation:carShake .3s}
  @keyframes carShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
  .car-svg-wrap.frunk-open{transform:translateY(-4px)}
  .car-svg-wrap.trunk-open{transform:translateY(-3px)}
  .car-svg-wrap.honk{animation:carHonk .15s 3}
  @keyframes carHonk{0%,100%{transform:translateY(0)}50%{transform:translateY(2px)}}

  /* ── Car State Badge ── */
  .car-badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600;color:var(--onSurfaceDim);display:flex;align-items:center;gap:4px;border:1px solid rgba(255,255,255,.06);z-index:2}
  .car-badge .bd-dot{width:5px;height:5px;border-radius:50%}

  /* ── Battery Bar ── */
  .batt-bar{display:flex;align-items:center;gap:12px;padding:4px 0 6px;margin-top:-4px}
  .batt-bar .bb-left{display:flex;align-items:center;gap:10px}
  .batt-bar .batt-ring{position:relative;width:44px;height:44px;flex-shrink:0}
  .batt-bar .batt-ring svg{transform:rotate(-90deg)}
  .batt-bar .batt-ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
  .batt-bar .range-wrap{display:flex;flex-direction:column}
  .batt-bar .range-wrap .range{font-size:22px;font-weight:700;letter-spacing:-.5px}
  .batt-bar .range-wrap .range-unit{font-size:11px;font-weight:500;color:var(--onSurfaceDim);margin-left:1px}
  .batt-bar .range-wrap .sub{font-size:10px;color:var(--onSurfaceMuted)}
  .batt-bar .bb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .batt-bar .bb-stat{text-align:center}
  .batt-bar .bb-stat .val{font-size:14px;font-weight:600}
  .batt-bar .bb-stat .lbl{font-size:9px;color:var(--onSurfaceMuted);margin-top:0}
  .lock-section{padding:2px 0 6px}
  .lock-btn{width:100%;padding:16px;border-radius:var(--radius);border:none;background:var(--card);border:1px solid var(--cardBorder);font-family:inherit;font-size:16px;font-weight:600;color:var(--onSurface);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;-webkit-tap-highlight-color:transparent}
  .lock-btn.locked{background:var(--redDim);border-color:rgba(255,69,58,.2);color:var(--red)}
  .lock-btn.unlocked{background:var(--greenDim);border-color:rgba(48,209,88,.2);color:var(--green)}
  .lock-btn .icon{font-size:22px}
  .lock-btn:active{transform:scale(.98)}

  /* ── Quick Controls ── */
  .section-label{font-size:15px;font-weight:700;padding:16px 0 10px}
  .quick-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
  .qc{background:var(--card);border:1px solid var(--cardBorder);border-radius:var(--radiusSm);padding:14px 4px 10px;text-align:center;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none}
  .qc:active{background:var(--surface3);transform:scale(.94)}
  .qc .icon{font-size:22px;display:block;margin-bottom:4px;line-height:1.2}
  .qc .label{font-size:11px;font-weight:500;color:var(--onSurfaceDim);letter-spacing:.2px}

  /* ── Vehicle List ── */
  .dropdown-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);display:none;animation:fadeIn .2s}
  .dropdown-overlay.show{display:block}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .dropdown-sheet{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px calc(env(safe-area-inset-bottom,16px)+16px);z-index:201;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:70vh;overflow-y:auto}
  .dropdown-sheet.show{transform:translateY(0)}
  .dropdown-sheet .handle{width:36px;height:4px;border-radius:2px;background:var(--surface3);margin:0 auto 16px}
  .dropdown-sheet .title{font-size:16px;font-weight:700;margin-bottom:12px}
  .dropdown-item{display:flex;align-items:center;gap:12px;padding:14px 12px;border-radius:var(--radiusSm);cursor:pointer;margin-bottom:4px}
  .dropdown-item:active{background:var(--surface2)}
  .dropdown-item.active{background:var(--accentDim);border:1px solid rgba(22,120,255,.15)}
  .dropdown-item .di-icon{font-size:28px;width:40px;text-align:center}
  .dropdown-item .di-info{flex:1}
  .dropdown-item .di-name{font-size:14px;font-weight:600}
  .dropdown-item .di-sub{font-size:11px;color:var(--onSurfaceDim);margin-top:2px}
  .dropdown-item .di-check{color:var(--accent);font-size:14px;font-weight:700}

  .v-item{margin-bottom:4px}
  .v-item .v-info{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--radiusSm);cursor:pointer}
  .v-item .v-info:active{background:var(--surface2)}
  .v-item .v-icon{font-size:26px;width:36px;text-align:center}
  .v-item .v-name{font-size:14px;font-weight:600}
  .v-item .v-sub{font-size:11px;color:var(--onSurfaceDim);margin-top:1px}
  .v-item .v-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:var(--accentDim);color:var(--accent);margin-left:auto}
  .v-item .v-del{opacity:0;transition:opacity .15s;font-size:16px;cursor:pointer;color:var(--onSurfaceMuted);padding:4px}
  .v-item:hover .v-del,.v-item .v-del.show{opacity:1}

  /* ── Add Vehicle ── */
  .add-form{background:var(--card);border:1px solid var(--cardBorder);border-radius:var(--radius);padding:20px;margin-top:12px}
  .add-form .af-title{font-size:16px;font-weight:700;margin-bottom:16px}
  .add-form label{font-size:11px;font-weight:600;color:var(--onSurfaceDim);display:block;margin-bottom:4px;margin-top:12px;text-transform:uppercase;letter-spacing:.3px}
  .add-form label:first-of-type{margin-top:0}
  .add-form input,.add-form select{width:100%;background:var(--surface3);border:1px solid var(--cardBorder);border-radius:var(--radiusXs);padding:12px 14px;color:var(--onSurface);font-size:13px;outline:none;font-family:inherit}
  .add-form input:focus{border-color:var(--accent)}
  .add-form .vin-row{display:flex;gap:8px}
  .add-form .vin-row input{flex:1;font-family:'SF Mono','Menlo',monospace;font-size:13px;letter-spacing:2px;text-transform:uppercase}
  .add-form .vin-row button{background:var(--accent);border:none;border-radius:var(--radiusXs);padding:0 16px;color:#fff;font-weight:600;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
  .add-form .vin-row button:active{opacity:.8}
  .add-form .add-tabs{display:flex;gap:6px;margin-bottom:12px}
  .add-form .add-tab{flex:1;padding:8px;border:1px solid var(--cardBorder);border-radius:var(--radiusXs);background:var(--surface3);color:var(--onSurfaceDim);font-size:12px;font-weight:600;cursor:pointer;text-align:center;font-family:inherit;transition:all .2s}
  .add-form .add-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .add-form .add-tab:active{opacity:.8}
  .add-form .vin-result{padding:10px;border-radius:var(--radiusXs);font-size:12px;line-height:1.6;display:none;margin-top:8px}
  .add-form .vin-result.show{display:block}
  .add-form .vin-result.success{background:var(--greenDim);border:1px solid rgba(48,209,88,.15)}
  .add-form .vin-result.error{background:var(--redDim);border:1px solid rgba(255,69,58,.15)}
  .add-form .add-row{display:flex;gap:10px;margin-top:4px}
  .add-form .add-col{flex:1;min-width:0}
  .add-form .add-col select{width:100%}
  .add-form .add-col .color-picker{flex-wrap:wrap}
  .add-form .color-picker{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .add-form .color-chip{width:32px;height:32px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .12s}
  .add-form .color-chip.active{border-color:var(--onSurface);transform:scale(1.1)}
  .add-form .btn-save{width:100%;padding:14px;border-radius:var(--radiusSm);border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:16px}
  .add-form .btn-save:active{opacity:.8}
  .add-form .btn-cancel{width:100%;padding:10px;border:none;background:none;color:var(--onSurfaceDim);font-size:12px;cursor:pointer;font-family:inherit;margin-top:8px}

  /* ── Settings ── */
  .settings-group{margin-top:8px}
  .settings-group label{font-size:11px;color:var(--onSurfaceMuted);display:block;margin-bottom:4px;margin-top:10px}
  .settings-group input{width:100%;background:var(--card);border:1px solid var(--cardBorder);border-radius:var(--radiusXs);padding:12px 14px;color:var(--onSurface);font-size:13px;outline:none;font-family:inherit;margin-bottom:4px}
  .settings-group input:focus{border-color:var(--accent)}
  .mode-selector{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:6px 0}
  .mode-chip{padding:10px;border-radius:var(--radiusXs);background:var(--card);border:1px solid var(--cardBorder);text-align:center;font-size:11px;font-weight:500;color:var(--onSurfaceDim);cursor:pointer;transition:all .15s}
  .mode-chip.active{background:var(--accentDim);border-color:var(--accent);color:var(--accent)}

  /* ── Diagnostics ── */
  .diag-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
  .diag-card{background:var(--card);border:1px solid var(--cardBorder);border-radius:var(--radiusSm);padding:14px;position:relative;overflow:hidden;backdrop-filter:blur(10px)}
  .diag-card .dc-row{display:flex;align-items:center;justify-content:space-between}
  .diag-card .dc-icon{font-size:18px;width:28px}
  .diag-card .dc-name{font-size:11px;font-weight:600;color:var(--onSurfaceDim)}
  .diag-card .dc-indicator{width:8px;height:8px;border-radius:50%}
  .diag-card .dc-indicator.ok{background:var(--green);box-shadow:0 0 6px rgba(48,209,88,.4)}
  .diag-card .dc-indicator.warn{background:var(--amber);box-shadow:0 0 6px rgba(255,159,10,.4)}
  .diag-card .dc-indicator.error{background:var(--red);box-shadow:0 0 6px rgba(255,69,58,.4)}
  .diag-card .dc-indicator.offline{background:var(--onSurfaceMuted)}
  .diag-card .dc-status{font-size:10px;color:var(--onSurfaceMuted);margin-top:4px;padding-left:28px;line-height:1.4}
  .diag-card .dc-pulse{position:absolute;width:8px;height:8px;border-radius:50%;top:14px;right:14px;animation:pulse 2s infinite}
  .diag-card .dc-pulse.ok{background:var(--green)}.diag-card .dc-pulse.warn{background:var(--amber)}.diag-card .dc-pulse.error{background:var(--red)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 currentColor}70%{box-shadow:0 0 0 6px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .diag-card .dc-pulse.ok{color:var(--green)}.diag-card .dc-pulse.warn{color:var(--amber)}.diag-card .dc-pulse.error{color:var(--red)}
  .diag-summary{display:flex;gap:6px;justify-content:center;padding:8px 0 4px}
  .diag-summary .ds-item{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:500;color:var(--onSurfaceMuted);padding:4px 10px;border-radius:20px;background:var(--card);border:1px solid var(--cardBorder)}
  .diag-summary .ds-item .ds-dot{width:5px;height:5px;border-radius:50%}
  .diag-summary .ds-item .ds-dot.ok{background:var(--green)}
  .diag-summary .ds-item .ds-dot.warn{background:var(--amber)}
  .diag-summary .ds-item .ds-dot.error{background:var(--red)}

  /* ── Bottom Dock ── */
  .bottom-dock{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;padding:6px 20px calc(env(safe-area-inset-bottom,8px)+6px);background:rgba(0,0,0,.92);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:1px solid rgba(255,255,255,.06);z-index:100}
  .dock-grid{display:flex;justify-content:space-around;align-items:center}
  .dock-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 16px;cursor:pointer;border:none;background:none;color:var(--onSurfaceMuted);font-family:inherit;font-size:10px;font-weight:500;transition:color .15s;border-radius:var(--radiusXs)}
  .dock-item .icon{font-size:22px;line-height:1.2}
  .dock-item.active{color:var(--accent)}
  .dock-item:active{background:var(--surface2)}

  /* ── Panels ── */
  .panel{display:none;animation:fadeUp .25s ease}
  .panel.active{display:block}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%)translateY(60px);background:var(--surface3);padding:10px 20px;border-radius:100px;font-size:13px;font-weight:500;color:var(--onSurface);opacity:0;transition:all .3s;pointer-events:none;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.5);white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%)translateY(0)}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="tb-left" onclick="showVehiclePicker()">
      <span class="tb-vehicle"><span id="vsName">Model S 85D</span><span class="arrow">▼</span></span>
    </div>
    <div class="tb-conn">
      <span class="conn-dot offline" id="connDot"></span>
      <span id="connLabel">未连接</span>
    </div>
  </div>

  <!-- Controls Panel -->
  <div class="panel active" id="panel-controls">

    <!-- Car Hero Area -->
    <div class="car-hero" id="carStage">
      <div class="glow" id="carGlow"></div>
      <div class="car-svg-wrap" id="carWrap">
        <svg viewBox="0 0 300 170" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Blueprint background -->
          <rect x="0" y="0" width="300" height="170" fill="#0a1628"/>

          <!-- Blueprint grid -->
          <g stroke="rgba(79,195,247,.04)" stroke-width=".3">
            <line x1="0" y1="0" x2="0" y2="170"/><line x1="15" y1="0" x2="15" y2="170"/>
            <line x1="30" y1="0" x2="30" y2="170"/><line x1="45" y1="0" x2="45" y2="170"/>
            <line x1="60" y1="0" x2="60" y2="170"/><line x1="75" y1="0" x2="75" y2="170"/>
            <line x1="90" y1="0" x2="90" y2="170"/><line x1="105" y1="0" x2="105" y2="170"/>
            <line x1="120" y1="0" x2="120" y2="170"/><line x1="135" y1="0" x2="135" y2="170"/>
            <line x1="150" y1="0" x2="150" y2="170"/><line x1="165" y1="0" x2="165" y2="170"/>
            <line x1="180" y1="0" x2="180" y2="170"/><line x1="195" y1="0" x2="195" y2="170"/>
            <line x1="210" y1="0" x2="210" y2="170"/><line x1="225" y1="0" x2="225" y2="170"/>
            <line x1="240" y1="0" x2="240" y2="170"/><line x1="255" y1="0" x2="255" y2="170"/>
            <line x1="270" y1="0" x2="270" y2="170"/><line x1="285" y1="0" x2="285" y2="170"/>
            <line x1="0" y1="0" x2="300" y2="0"/><line x1="0" y1="10" x2="300" y2="10"/>
            <line x1="0" y1="20" x2="300" y2="20"/><line x1="0" y1="30" x2="300" y2="30"/>
            <line x1="0" y1="40" x2="300" y2="40"/><line x1="0" y1="50" x2="300" y2="50"/>
            <line x1="0" y1="60" x2="300" y2="60"/><line x1="0" y1="70" x2="300" y2="70"/>
            <line x1="0" y1="80" x2="300" y2="80"/><line x1="0" y1="90" x2="300" y2="90"/>
            <line x1="0" y1="100" x2="300" y2="100"/><line x1="0" y1="110" x2="300" y2="110"/>
            <line x1="0" y1="120" x2="300" y2="120"/><line x1="0" y1="130" x2="300" y2="130"/>
            <line x1="0" y1="140" x2="300" y2="140"/><line x1="0" y1="150" x2="300" y2="150"/>
            <line x1="0" y1="160" x2="300" y2="160"/>
          </g>

          <!-- Ground line -->
          <line x1="5" y1="148" x2="295" y2="148" stroke="rgba(79,195,247,.15)" stroke-width=".5" stroke-dasharray="3,3"/>

          <!-- ══ BLUEPRINT TESLA MODEL S SIDE PROFILE ══ -->

          <!-- Dimension lines (vertical) -->
          <line x1="8" y1="30" x2="8" y2="148" stroke="rgba(79,195,247,.2)" stroke-width=".4"/>
          <line x1="290" y1="30" x2="290" y2="148" stroke="rgba(79,195,247,.2)" stroke-width=".4"/>
          <!-- Dimension arrows -->
          <text x="144" y="165" text-anchor="middle" font-size="6" fill="rgba(79,195,247,.3)" font-family="monospace">4970 mm</text>
          <text x="4" y="85" text-anchor="middle" font-size="5" fill="rgba(79,195,247,.2)" font-family="monospace" transform="rotate(-90,4,85)">1440 mm</text>

          <!-- Main body - blueprint outline style (stroke only, no fill) -->
          <path d="M36 130 C14 128 8 112 8 96 C8 80 14 66 26 60 L32 56 C40 46 52 36 72 32 L100 28 L132 28 L162 32 C182 36 196 46 204 56 L210 60 C224 66 230 80 230 96 C230 112 224 128 202 130 L192 134 C184 140 172 144 152 145 L90 145 C70 144 58 140 50 134 L36 130Z"
            stroke="#4fc3f7" stroke-width="1.2" fill="none" class="car-part"/>

          <!-- Inner construction lines -->
          <path d="M36 130 C14 128 8 112 8 96 C8 80 14 66 26 60 L32 56 C40 46 52 36 72 32 L100 28 L132 28 L162 32 C182 36 196 46 204 56 L210 60 C224 66 230 80 230 96 C230 112 224 128 202 130 L192 134 C184 140 172 144 152 145 L90 145 C70 144 58 140 50 134 L36 130Z"
            stroke="rgba(79,195,247,.08)" stroke-width=".3" fill="none" transform="scale(.98) translate(3,1.5)"/>

          <!-- Roof / greenhouse -->
          <path d="M56 56 C62 42 76 32 96 28 L116 27 C140 28 156 34 166 46"
            stroke="#4fc3f7" stroke-width=".8" fill="none" class="car-part"/>

          <!-- Windshield -->
          <path d="M56 56 C62 42 76 32 96 28 L108 28 L108 48 C88 50 72 56 60 66 L56 56Z"
            stroke="#4fc3f7" stroke-width=".6" fill="none" opacity=".6"/>

          <!-- Rear window -->
          <path d="M178 46 C168 36 154 30 138 28 L138 48 C152 48 166 54 176 62 L178 46Z"
            stroke="#4fc3f7" stroke-width=".6" fill="none" opacity=".6"/>

          <!-- Door seams (blueprint dashed) -->

<script>
// ══════════════════════════════════════════════════════════════════
//  VEHICLE DATABASE
// ══════════════════════════════════════════════════════════════════

const COLORS = [
  {id:'pearl_white',cn:'珍珠白',hex:'#f5f5f0'},{id:'solid_black',cn:'纯黑',hex:'#1a1a1a'},
  {id:'obsidian_black',cn:'曜石黑',hex:'#282828'},{id:'midnight_silver',cn:'午夜银',hex:'#6b6b6b'},
  {id:'deep_blue',cn:'深海蓝',hex:'#1a2b5c'},{id:'red_multicoat',cn:'中国红',hex:'#c41e2a'},
  {id:'signature_red',cn:'签名红',hex:'#b81a24'},{id:'silver',cn:'银色',hex:'#c0c0c0'},
  {id:'stealth_grey',cn:'隐形灰',hex:'#4a4a52'},{id:'ultra_red',cn:'超红',hex:'#d42e3a'},
  {id:'cream',cn:'奶油白',hex:'#f5e6d3'},{id:'matte_black',cn:'哑光黑',hex:'#1c1c1c'},
  {id:'matte_grey',cn:'哑光灰',hex:'#5c5c5c'},{id:'satin_darkgrey',cn:'锻面深灰',hex:'#3d3d3d'},
  {id:'custom',cn:'自定义',hex:null},
];

const INTERIOR_COLORS_DATA = [
  {id:'black',cn:'黑色',hex:'#1a1a1a'},{id:'white',cn:'白色',hex:'#f0ede6'},
  {id:'cream',cn:'奶油色',hex:'#f5e6d3'},{id:'tan',cn:'棕褐色',hex:'#c4a882'},
  {id:'grey',cn:'灰色',hex:'#8a8a8a'},{id:'oak',cn:'橡木色',hex:'#c19a6b'},
  {id:'red_plaid',cn:'红色 Plaid',hex:'#c41e2a'},{id:'custom_leather',cn:'自定义',hex:null},
];

const MODEL_ICONS = {'S':'🚗','X':'🚙','3':'🚘','Y':'🚙','C':'🛻','R':'🏎️'};

let vehicles = [];
let activeVehicleId = null;

/* ── Load from localStorage ── */
function loadVehicles() {
  try {
    const data = localStorage.getItem('tsl_vehicles_v2');
    vehicles = data ? JSON.parse(data) : [];
  } catch(e) { vehicles = []; }

  // Default vehicle if none saved
  if (vehicles.length === 0) {
    vehicles.push({
      id: 'v_default',
      nick: 'Model S 85D',
      vin: '',
      modelName: 'Model S 85D',
      year: 2015,
      battery: '85kWh',
      range: 443,
      color: 'midnight_silver',
      customHex: '',
      wheelSize: 'stock_19',
      mcu: 'mcu1',
      bodyStyle: 'stock_og',
      interiorColor: 'black',
      interiorCustomHex: '',
      note: '香港 · 原白改灰',
      icon: '🚗',
      createdAt: Date.now(),
    });
    saveVehicles();
  }

  // Set active
  activeVehicleId = localStorage.getItem('tsl_active_vehicle') || vehicles[0].id;
  if (!vehicles.find(v => v.id === activeVehicleId)) {
    activeVehicleId = vehicles[0].id;
  }
}

function saveVehicles() {
  localStorage.setItem('tsl_vehicles_v2', JSON.stringify(vehicles));
  localStorage.setItem('tsl_active_vehicle', activeVehicleId);
}

/* ── Get active vehicle ── */
function activeVehicle() {
  return vehicles.find(v => v.id === activeVehicleId) || vehicles[0];
}

/* ── Render vehicle picker list ── */
function renderVehiclePicker() {
  const list = document.getElementById('vehicleList');
  if (vehicles.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--onSurfaceMuted);font-size:13px">暂无车辆</div>';
    return;
  }
  list.innerHTML = vehicles.map(v => {
    const isActive = v.id === activeVehicleId;
    return `<div class="v-item">
      <div class="v-info" onclick="selectVehicle('${v.id}')" style="${isActive ? 'background:var(--accentDim);border-radius:var(--radiusSm)' : ''}">
        <span class="v-icon">${v.icon || '🚗'}</span>
        <div style="flex:1">
          <div class="v-name">${v.nick}</div>
          <div class="v-sub">${v.modelName || 'Tesla'} · ${v.vin ? v.vin.slice(0,8)+'…' : '无 VIN'}</div>
        </div>
        ${isActive ? '<span class="v-badge">当前</span>' : ''}
        <span class="v-del ${isActive?'show':''}" onclick="event.stopPropagation();deleteVehicle('${v.id}')">✕</span>
      </div>
    </div>`;
  }).join('');
}

/* ── Select vehicle ── */
function selectVehicle(id) {
  activeVehicleId = id;
  saveVehicles();
  hideVehiclePicker();
  updateVehicleUI();
  updateCarVisual();
  pollStatus();
}

/* ── Delete vehicle ── */
function deleteVehicle(id) {
  if (vehicles.length <= 1) {
    toast('至少保留一辆车', 'error');
    return;
  }
  vehicles = vehicles.filter(v => v.id !== id);
  if (activeVehicleId === id) {
    activeVehicleId = vehicles[0].id;
  }
  saveVehicles();
  renderVehiclePicker();
  updateVehicleUI();
  updateCarVisual();
  toast('🗑️ 已删除');
}

/* ── Update main UI for active vehicle ── */
function updateVehicleUI() {
  const v = activeVehicle();
  if (!v) return;

  document.getElementById('vsName').textContent = v.nick;
  document.getElementById('carModelDisplay')?.remove();
}

/* ══════════════════════════════════════════════════════════════════
   ADD VEHICLE
function showAddVehicle() {
  document.getElementById('addOverlay').classList.add('show');
  document.getElementById('addSheet').classList.add('show');
  document.getElementById('newVin').value = '';
  document.getElementById('newNick').value = '';
  document.getElementById('newNote').value = '';
  document.getElementById('newCustomHex').value = '';
  document.getElementById('newCustomInteriorHex').value = '';
  document.getElementById('newWheelSize').value = 'stock_19';
  document.getElementById('newMcu').value = 'mcu1';
  document.getElementById('newBodyStyle').value = 'stock_og';
  document.getElementById('newVinResult').className = 'vin-result';
  document.getElementById('newVinResult').style.display = 'none';
  document.getElementById('newModelInfo').style.display = 'none';
  document.getElementById('newModelSelect').value = '';
  _selectedNewColor = 'midnight_silver';
  _selectedInteriorColor = 'black';
  _selectedModelData = null;
  renderNewColorPicker();
  renderNewInteriorPicker();
  switchAddMode('vin');
  loadModelList();
  // Populate year dropdown
  const yrSel=document.getElementById('newYear');
  if(!yrSel.options.length){
    const now=new Date().getFullYear();
    for(let y=now;y>=2012;y--){
      const o=document.createElement('option');
      o.value=y;o.textContent=y;
      if(y===2015)o.selected=true;
      yrSel.appendChild(o);
    }
  }
}

/* ── Tab switch ── */
function switchAddMode(mode) {
  document.getElementById('tabVin').className = mode==='vin' ? 'add-tab active' : 'add-tab';
  document.getElementById('tabModel').className = mode==='model' ? 'add-tab active' : 'add-tab';

async function decodeNewVin() {
  const vin = document.getElementById('newVin').value.trim().toUpperCase();
  const rd = document.getElementById('newVinResult');
  if (vin.length !== 17) {
    rd.className = 'vin-result error show'; rd.style.display = 'block';
    rd.textContent = '⚠️ VIN 必须是 17 位';
    return;
  }
  // Auto-fill nick
  if (!document.getElementById('newNick').value) {
    document.getElementById('newNick').value = 'My Tesla';
  }
  // Try server decode
  const base = getActiveUrl();
  if (base && !base.includes('x.x')) {
    try {
      const r = await fetch(base+'/api/decode-vin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({vin})});
      const d = await r.json();
      if (d.model) {
        rd.className = 'vin-result success show'; rd.style.display = 'block';
        rd.innerHTML = `✅ <strong>${d.model.name}</strong> · ${d.year||'?'}<br>📍 ${d.origin?.country||'?'} · ${d.origin?.plant||'?'}<br>🔋 ${d.model.battery||'?'} · ⛰️ ${d.model.range_km||'?'}km`;
        if (!document.getElementById('newNick').value || document.getElementById('newNick').value === 'My Tesla') {
          document.getElementById('newNick').value = d.model.name;
        }
        return;
      }
    } catch(e) {}
  }
  // Local guess
  const guess = vin.startsWith('5YJSB7') ? 'Model S 85D' : vin.startsWith('5YJ') ? 'Tesla (USA)' : vin.startsWith('LRW') ? 'Tesla (China)' : 'Tesla';
  rd.className = 'vin-result success show'; rd.style.display = 'block';
  rd.textContent = `🔍 ${guess}`;
  if (!document.getElementById('newNick').value || document.getElementById('newNick').value === 'My Tesla') {
    document.getElementById('newNick').value = guess;
  }
}

function saveNewVehicle() {
  const vin = document.getElementById('newVin').value.trim().toUpperCase();
  const nick = document.getElementById('newNick').value.trim();
  const note = document.getElementById('newNote').value.trim();
  const subModel = document.getElementById('newSubModel').value;
  const selYear = document.getElementById('newYear').value;
  const region = document.getElementById('newRegion').value;

  // VIN is optional — only validate if filled
  if (vin && vin.length !== 17) {
    toast('⚠️ VIN 应为 17 位', 'error');
    return;
  }

  // Must have EITHER VIN or model selected
  const isModelMode = _selectedModelData !== null;
  if (!vin && !isModelMode) {
    toast('⚠️ 请扫 VIN 或选择车型', 'error');
    return;
  }

  // Guess model info
  let modelName = 'Tesla';
  let year = parseInt(selYear) || null;
  let battery = '';
  let range = null;
  let icon = '🚗';

  if (isModelMode && _selectedModelData) {
    modelName = _selectedModelData.name || '';
    battery = (_selectedModelData.battery_kwh || '') + 'kWh';
    range = _selectedModelData.range_km || null;
    icon = _selectedModelData.icon || '🚗';
    const iconMap = {'S':'🚗','X':'🚙','3':'🚘','Y':'🚙','C':'🛻','R':'🏎️'};
    if (!icon || icon === '🚗') {
      const series = (modelName.match(/Model ([SX3YCR])/) || [])[1];
      icon = iconMap[series] || '🚗';
    }
  } else if (vin) {
    // VIN mode — guess from VIN prefix
    if (vin.startsWith('5YJSB7') || vin.startsWith('5YJSA7')) {
      modelName = 'Model S 85D'; icon = '🚗'; battery = '85kWh'; range = 443;
      const yc = vin[9];
      const years = {D:2013,E:2014,F:2015,G:2016,H:2017};
      year = years[yc] || 2015;
    } else if (vin.startsWith('5YJSA4')) {
      modelName = 'Model S 85'; icon = '🚗'; battery = '85kWh'; range = 426;
    } else if (vin.startsWith('5YJSA1') || vin.startsWith('5YJSA3')) {
      modelName = 'Model S 60'; icon = '🚗';
    } else if (vin.startsWith('5YJSA5')) {
      modelName = 'Model S P85'; icon = '🚗';
    } else if (vin.startsWith('5YJ3')) {
      modelName = 'Model 3'; icon = '🚘';
    } else if (vin.startsWith('5YJX')) {
      modelName = 'Model X'; icon = '🚙';
    } else if (vin.startsWith('5YJY') || vin.startsWith('LRWY')) {
      modelName = 'Model Y'; icon = '🚙';
    } else if (vin.startsWith('LRW3')) {
      modelName = 'Model 3 (China)'; icon = '🚘';
    } else if (vin.startsWith('7G2')) {
      modelName = 'Cybertruck'; icon = '🛻';
    }
  }

  const vehicle = {
    id: 'v_' + Date.now(),
    nick: nick || modelName,
    vin: vin,
    modelName: modelName,
    year: year,
    battery: battery,
    range: range,
    color: _selectedNewColor,
    customHex: document.getElementById('newCustomHex').value.trim(),
    wheelSize: document.getElementById('newWheelSize').value,
    mcu: document.getElementById('newMcu').value,
    bodyStyle: document.getElementById('newBodyStyle').value,
    interiorColor: _selectedInteriorColor,
    interiorCustomHex: document.getElementById('newCustomInteriorHex').value.trim(),
    subModel: subModel,
    region: region,
    note: note,
    icon: icon,
    createdAt: Date.now(),
  };

  vehicles.push(vehicle);
  activeVehicleId = vehicle.id;
  saveVehicles();
  hideAddVehicle();

  renderVehiclePicker();
  updateVehicleUI();
  updateCarVisual();
  toast(`✅ ${nick} 已绑定`);
}

const CAR = {locked:true,doorsOpen:false,frunkOpen:false,trunkOpen:false,windowsVent:false,lightsOn:false,flashActive:false,charging:false,connected:false,honking:false};

function updateCarVisual() {
  const wrap = document.getElementById('carWrap');
  const glow = document.getElementById('carGlow');
  const badge = document.getElementById('stateLabel');
  const dot = document.getElementById('stateDot');
  wrap.className = 'car-svg-wrap';
  glow.className = 'glow';

  // ── Hide all state groups first ──
  document.querySelectorAll('.state-charging, .state-frunk, .state-trunk, .state-lights, .state-flash').forEach(g => {
    g.style.display = 'none';
  });
  // Door seams
  document.querySelector('.door-seams').style.display = 'none';

  // ── Glow ──
  if (CAR.flashActive) {
    glow.classList.add('locked');
  } else if (CAR.doorsOpen || !CAR.locked) {
    glow.classList.add('unlocked');
  } else if (CAR.locked) {
    glow.classList.add('locked');
  }
  if (CAR.charging) glow.classList.add('charging');

  // ── State label ──
  if (!CAR.connected) {
    badge.textContent = '离线'; dot.style.background = 'var(--onSurfaceMuted)';
    wrap.style.opacity = '.5';
  } else if (CAR.flashActive) {
    badge.textContent = '💡 闪灯'; dot.style.background = 'var(--amber)';
    wrap.style.opacity = '1';
  } else if (CAR.doorsOpen || !CAR.locked) {
    badge.textContent = '🔓 已开门'; dot.style.background = 'var(--green)';
    wrap.style.opacity = '1';
  } else if (CAR.locked) {
    badge.textContent = '🔒 已锁门'; dot.style.background = 'var(--red)';
    wrap.style.opacity = '1';
  }

  // ── Frunk ──
  if (CAR.frunkOpen) {
    document.querySelector('.state-frunk').style.display = 'block';
    badge.textContent = '▲ 前备箱开'; dot.style.background = 'var(--amber)';
  }
  // ── Trunk ──
  if (CAR.trunkOpen) {
    document.querySelector('.state-trunk').style.display = 'block';
    if (!CAR.frunkOpen) { badge.textContent = '▲ 后备箱开'; dot.style.background = 'var(--amber)'; }
  }
  // ── Lights (on) ──
  if (CAR.lightsOn) {
    document.querySelector('.state-lights').style.display = 'block';
  }
  // ── Flash ──
  if (CAR.flashActive) {
    document.querySelector('.state-flash').style.display = 'block';
    wrap.classList.add('shake');
    setTimeout(() => wrap.classList.remove('shake'), 300);
    setTimeout(() => { CAR.flashActive = false; updateCarVisual(); }, 400);
  }
  // ── Charging ──
  if (CAR.charging) {
    document.querySelector('.state-charging').style.display = 'block';
    badge.textContent = '⚡ 充电中'; dot.style.background = 'var(--accent)';
  }
  // ── Honk ──
  if (CAR.honking) {
    wrap.classList.add('honk');
    setTimeout(() => { CAR.honking = false; updateCarVisual(); }, 500);
  }
  // ── Unlocked: show door seams ──
  if (CAR.doorsOpen || !CAR.locked) {
    document.querySelector('.door-seams').style.display = 'block';
  }
}

async function sendCmd(cmd) {
  const btn = event?.target?.closest('.qc,.lock-btn');
  btn?.style.setProperty('opacity','.5');
  if (cmd==='frunk'){CAR.frunkOpen=!CAR.frunkOpen;CAR.locked=false}
  else if (cmd==='trunk'){CAR.trunkOpen=!CAR.trunkOpen;CAR.locked=false}
  else if (cmd==='lock'){CAR.locked=true;CAR.doorsOpen=false;CAR.frunkOpen=false;CAR.trunkOpen=false}
  else if (cmd==='unlock'){CAR.locked=false;CAR.doorsOpen=true}
  else if (cmd==='flash_lights'){CAR.flashActive=true;setTimeout(()=>{CAR.flashActive=false;updateCarVisual()},800)}
  else if (cmd==='honk'){CAR.honking=true}
  else if (cmd==='windows_vent'){CAR.windowsVent=true}
  else if (cmd==='windows_close'){CAR.windowsVent=false}
  updateCarVisual();
  try {
    const r = await api('POST',cmd);
    if(r&&r.success) toast(`✅ ${{lock:'🔒已锁门',unlock:'🔓已开门',frunk:'🟢前备箱',trunk:'🟤后备箱',flash_lights:'💡闪灯',honk:'📯鸣笛',windows_vent:'🪟通风',windows_close:'🔒关窗'}[cmd]||cmd}`);
    else if(r){if(cmd==='lock')CAR.locked=false;else if(cmd==='unlock'){CAR.locked=true;CAR.doorsOpen=false}else if(cmd==='frunk')CAR.frunkOpen=!CAR.frunkOpen;else if(cmd==='trunk')CAR.trunkOpen=!CAR.trunkOpen;updateCarVisual();toast('⚠️失败','error')}
  }finally{btn?.style.removeProperty('opacity')}
}

async function toggleLock(e) {
  if(e){const r=e.currentTarget.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;const ri=document.createElement('span');ri.className='ripple';ri.style.cssText=`left:${x}px;top:${y}px;width:10px;height:10px;margin:-5px 0 0 -5px`;e.currentTarget.appendChild(ri);setTimeout(()=>ri.remove(),600)}
  const cmd=CAR.locked?'unlock':'lock';
  document.getElementById('lockBtn').classList.add('loading');
  if(cmd==='unlock'){CAR.locked=false;CAR.doorsOpen=true}else{CAR.locked=true;CAR.doorsOpen=false;CAR.frunkOpen=false;CAR.trunkOpen=false}
  updateCarVisual(); updateLockUI();
  try {
    const r=await api('POST',cmd);
    if(!r||!r.success){if(cmd==='unlock'){CAR.locked=true;CAR.doorsOpen=false}else{CAR.locked=false;CAR.doorsOpen=true}updateCarVisual();updateLockUI();toast('⚠️失败','error')}
    else toast(CAR.locked?'🔒已锁门':'🔓已开门');
  }finally{document.getElementById('lockBtn').classList.remove('loading')}
}
function updateLockUI(){const b=document.getElementById('lockBtn');const l=document.getElementById('lockLabel');const i=b.querySelector('.icon');if(CAR.locked){b.className='lock-btn locked';i.textContent='🔒';l.textContent='锁门'}else{b.className='lock-btn unlocked';i.textContent='🔓';l.textContent='已开门'}}

function getActiveUrl() {
  const mode = document.querySelector('.mode-chip.active')?.dataset.mode;
  if(mode==='tailscale') return 'http://'+(document.getElementById('tsIp').value||'100.x.x.x')+':5000';
  if(mode==='ddns') return 'http://'+(document.getElementById('ddnsDomain').value||'');
  return document.getElementById('serverUrl').value||'';
}
function getToken(){const t=document.getElementById('apiToken').value;localStorage.setItem('tsl_tok',t);return t}
async function api(method,path){
  const url=getActiveUrl()+'/api/'+path;
  if(url.includes('x.x')||!url)return null;
  const h={'Content-Type':'application/json'};const t=getToken();if(t)h['X-Api-Token']=t;
  try{const r=await fetch(url,{method,headers:h,signal:AbortSignal.timeout(5000)});if(!r.ok)return null;return await r.json()}catch(e){return null}
}

/* ── DIAGNOSTICS ── */
async function runDiagnostics() {
  const grid = document.getElementById('diagGrid');
  const summary = document.getElementById('diagSummary');

  // Reset to "checking" state
  grid.querySelectorAll('.dc-indicator').forEach(d => { d.className = 'dc-indicator offline'; });
  grid.querySelectorAll('.dc-status').forEach(d => { d.textContent = '检测中...'; });
  summary.innerHTML = '⏳ 正在检测系统状态...';

  // Server diagnostics
  const r = await api('GET', 'diagnostics');

  if (!r) {
    // Orange Pi offline — show limited local info
    grid.querySelectorAll('.dc-indicator')[0].className = 'dc-indicator error';
    grid.querySelectorAll('.dc-status')[0].textContent = 'Pi 未连接 — 无法检测';

    // Check phone's own Bluetooth
    if ('bluetooth' in navigator) {
      try {
        const avail = await navigator.bluetooth.getAvailability();
        grid.querySelectorAll('.dc-indicator')[2].className = avail ? 'dc-indicator ok' : 'dc-indicator error';
        grid.querySelectorAll('.dc-status')[2].textContent = avail ? '手机蓝牙可用' : '手机蓝牙未开启';
      } catch(e) {
        grid.querySelectorAll('.dc-indicator')[2].className = 'dc-indicator warn';
        grid.querySelectorAll('.dc-status')[2].textContent = '无法检测蓝牙状态';
      }
    } else {
      grid.querySelectorAll('.dc-indicator')[2].className = 'dc-indicator warn';
      grid.querySelectorAll('.dc-status')[2].textContent = '此浏览器不支持 Web Bluetooth';
    }

    // Everything else is unknown
    for (let i = 1; i <= 5; i++) {
      if (i === 2) continue; // already set
      const indicators = grid.querySelectorAll('.dc-indicator');
      const statuses = grid.querySelectorAll('.dc-status');
      if (indicators[i]) indicators[i].className = 'dc-indicator warn';
      if (statuses[i]) statuses[i].textContent = 'Orange Pi 离线';
    }

    summary.innerHTML = '<span class="ds-item"><span class="ds-dot error"></span>Pi 离线</span><span class="ds-item"><span class="ds-dot warn"></span>部分信息不可用</span>';
    return;
  }

  // ── Render each diagnostic card ──
  const diagItems = [
    { key: 'can',         icon: '🔌', name: 'CAN 总线', idx: 0 },
    { key: 'cellular',    icon: '📡', name: '4G/5G 网络', idx: 1 },
    { key: 'bluetooth',   icon: '📶', name: '蓝牙 (Pi)', idx: 2 },
    { key: 'internet',    icon: '🌐', name: '互联网', idx: 3 },
    { key: 'tailscale',   icon: '🔗', name: 'Tailscale', idx: 4 },
    { key: 'orange_pi',   icon: '🖥️', name: 'Orange Pi', idx: 5 },
  ];

  const indicators = grid.querySelectorAll('.dc-indicator');
  const statuses = grid.querySelectorAll('.dc-status');

  diagItems.forEach(item => {
    let status = 'error';
    let detail = '未知';

    if (item.key === 'internet') {
      status = r.cellular?.internet ? 'ok' : 'error';
      detail = r.cellular?.internet ? '互联网可达' : '无互联网连接';
    } else if (item.key === 'tailscale') {
      status = r.cellular?.tailscale ? 'ok' : 'warn';
      detail = r.cellular?.tailscale || '未安装 Tailscale';
    } else if (item.key === 'orange_pi') {
      status = 'ok';
      detail = 'API 响应正常 · 在线';
    } else {
      const data = r[item.key];
      if (data) {
        status = data.status || 'error';
        detail = data.detail || '';
      }
    }

    if (indicators[item.idx]) {
      indicators[item.idx].className = `dc-indicator ${status}`;
    }
    if (statuses[item.idx]) {
      statuses[item.idx].textContent = detail;
    }
  });

  // ── Summary bar ──
  const statusCounts = { ok: 0, warn: 0, error: 0 };
  indicators.forEach(d => {
    if (d.classList.contains('ok')) statusCounts.ok++;
    else if (d.classList.contains('warn')) statusCounts.warn++;
    else if (d.classList.contains('error')) statusCounts.error++;
  });

  const dotsClass = statusCounts.error > 0 ? 'error' : statusCounts.warn > 0 ? 'warn' : 'ok';
  const allOk = statusCounts.error === 0 && statusCounts.warn === 0;
  summary.innerHTML = `
    <span class="ds-item"><span class="ds-dot ${dotsClass}"></span>全部 ${allOk ? '正常' : Object.entries(statusCounts).filter(([k,v])=>v>0).map(([k,v])=>`${k=='ok'?'正常':k=='warn'?'警告':'异常'}(${v})`).join(' · ')}</span>
    <span class="ds-item"><span class="ds-dot ${dotsClass}"></span>
    ${statusCounts.error > 0 ? '⚠️ 需要处理' : statusCounts.warn > 0 ? '⚠️ 部分异常' : '✅ 一切正常'}
    </span>
  `;
}

async function pollStatus(){
  const r=await api('GET','status');
  const dot=document.getElementById('connDot');const label=document.getElementById('connLabel');
  if(!r){dot.className='conn-dot offline';label.textContent='未连接';CAR.connected=false;document.getElementById('stateDot').style.background='var(--onSurfaceMuted)';document.getElementById('stateLabel').textContent='离线';updateCarVisual();return}
  CAR.connected=true;
  dot.className=`conn-dot ${r.connected?'online':'offline'}`;
  label.textContent=r.connected?'已连接':'CAN离线';

  // Update battery ring
  if(r.battery_soc!=null){
    const pct=r.battery_soc;
    document.getElementById('battPct').textContent=pct;
    const circ=document.getElementById('battArc');
    const circumference=113.1;
    const offset=circumference-(circumference*pct/100);
    circ.setAttribute('stroke-dashoffset',offset);
    circ.setAttribute('stroke',pct>50?'var(--green)':pct>20?'var(--amber)':'var(--red)');
  }

  // Update range
  if(r.battery_soc!=null){
    const estKm=Math.round(443*r.battery_soc/100);
    document.getElementById('rangeKm').textContent=estKm;
  }

  // Update gear
  if(r.gear){
    document.getElementById('gearDisplay').textContent=r.gear;
  }

  // Update temperature
  if(r.ambient_temp_c!=null){
    document.getElementById('ambientTemp').textContent=Math.round(r.ambient_temp_c);
  }

  // Update state badge
  const stateDot=document.getElementById('stateDot');
  const stateLabel=document.getElementById('stateLabel');
  if(r.doors?.locked){
    stateDot.style.background='var(--red)';
    stateLabel.textContent='已锁';
  }else if(r.charge_port?.charging){
    stateDot.style.background='var(--green)';
    stateLabel.textContent='充电中';
  }else{
    stateDot.style.background='var(--onSurfaceMuted)';
    stateLabel.textContent='就绪';
  }

  updateCarVisual();
}

/* ══════════════════════════════════════════════════════════════════
   UI HELPERS
══════════════════════════════════════════════════════════════════ */

function navigateTo(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  document.querySelectorAll('.dock-item').forEach(d=>d.classList.remove('active'));
  const idx = {controls:1,diagnostics:2,settings:3}[name] || 1;
  document.querySelector('.dock-item:nth-child('+idx+')').classList.add('active');
  if (name === 'diagnostics') runDiagnostics();
}
function showVehiclePicker(){document.getElementById('pickerOverlay').classList.add('show');document.getElementById('pickerSheet').classList.add('show');renderVehiclePicker()}
function hideVehiclePicker(){document.getElementById('pickerOverlay').classList.remove('show');document.getElementById('pickerSheet').classList.remove('show')}
function toast(msg,type='success'){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._hide);el._hide=setTimeout(()=>el.classList.remove('show'),2000)}

function init() {
  // ── Toolbar ──
  document.getElementById('apiToken').value=localStorage.getItem('tsl_tok')||'';
  document.getElementById('tsIp').value=localStorage.getItem('tsl_ts')||'';
  document.getElementById('ddnsDomain').value=localStorage.getItem('tsl_ddns')||'';
  document.querySelectorAll('.mode-chip').forEach(c=>c.addEventListener('click',()=>{document.querySelectorAll('.mode-chip').forEach(x=>x.classList.remove('active'));c.classList.add('active');localStorage.setItem('tsl_mode',c.dataset.mode)}));
  loadVehicles();
  updateVehicleUI();
  updateCarVisual();
  pollStatus();
  setInterval(pollStatus,15000);
}
init();
</script>
